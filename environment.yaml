name: TranscriptPipeline
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.11
  - montreal-forced-aligner
  - pytorch=2.5.1  # Pinning to a stable version known for compatibility
  - torchaudio=2.5.1
  - pytorch-cuda=11.8
  - ffmpeg=6.1     # Specifically version 6 often works best with current torchcodec
  - pandas
  - pip
  - pip:
    - torchcodec==0.2.0  # Check compatibility table for your Torch version
    - TextGrid
    - lingua-language-detector
    - fastapi
    - uvicorn
    - python-multipart
    - transformers
    - peft
    - soundfile
    - silero-vad